name: Anchore Scan

on:
  push:

jobs:
  anchore:
    name: Anchor Image Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Run Anchore Scan
      uses: anchore/scan-action@v3.6.4
      with:
        image: dakshsawhneyy/demo-service-a:latest
        fail-build: true
        severity-cutoff: high
      env:
          GRYPE_DB_VALIDATE_AGE: false
